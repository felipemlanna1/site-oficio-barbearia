<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="30%" stop-color="#c8a45e"/>
      <stop offset="60%" stop-color="#b89444"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
    <linearGradient id="logoGold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a853" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b89444" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="logoShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c8a45e" flood-opacity="0.15"/>
    </filter>
    <clipPath id="borderClip">
      <rect x="30" y="15" width="540" height="170" rx="4"/>
    </clipPath>
  </defs>

  <!-- Outer frame -->
  <rect x="30" y="15" width="540" height="170" rx="4" fill="none" stroke="url(#logoGold2)" stroke-width="1.5"/>
  <rect x="36" y="21" width="528" height="158" rx="2" fill="none" stroke="url(#logoGold2)" stroke-width="0.5" opacity="0.5"/>

  <!-- Corner ornaments top-left -->
  <line x1="30" y1="40" x2="55" y2="40" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="15" x2="55" y2="40" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <circle cx="55" cy="40" r="2" fill="#c8a45e" opacity="0.5"/>

  <!-- Corner ornaments top-right -->
  <line x1="545" y1="40" x2="570" y2="40" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <line x1="545" y1="15" x2="545" y2="40" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <circle cx="545" cy="40" r="2" fill="#c8a45e" opacity="0.5"/>

  <!-- Corner ornaments bottom-left -->
  <line x1="30" y1="160" x2="55" y2="160" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="160" x2="55" y2="185" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <circle cx="55" cy="160" r="2" fill="#c8a45e" opacity="0.5"/>

  <!-- Corner ornaments bottom-right -->
  <line x1="545" y1="160" x2="570" y2="160" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <line x1="545" y1="160" x2="545" y2="185" stroke="#c8a45e" stroke-width="0.8" opacity="0.6"/>
  <circle cx="545" cy="160" r="2" fill="#c8a45e" opacity="0.5"/>

  <!-- Top decorative line with diamond -->
  <line x1="120" y1="45" x2="270" y2="45" stroke="url(#logoGold)" stroke-width="0.8" opacity="0.4"/>
  <polygon points="300,40 305,45 300,50 295,45" fill="#c8a45e" opacity="0.5"/>
  <line x1="330" y1="45" x2="480" y2="45" stroke="url(#logoGold)" stroke-width="0.8" opacity="0.4"/>

  <!-- Scissors icon left -->
  <g transform="translate(80,80) scale(0.4)" opacity="0.3">
    <circle cx="0" cy="30" r="12" fill="none" stroke="#c8a45e" stroke-width="2"/>
    <circle cx="40" cy="30" r="12" fill="none" stroke="#c8a45e" stroke-width="2"/>
    <line x1="8" y1="20" x2="32" y2="-10" stroke="#c8a45e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="20" x2="8" y2="-10" stroke="#c8a45e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Scissors icon right -->
  <g transform="translate(480,80) scale(0.4)" opacity="0.3">
    <circle cx="0" cy="30" r="12" fill="none" stroke="#c8a45e" stroke-width="2"/>
    <circle cx="40" cy="30" r="12" fill="none" stroke="#c8a45e" stroke-width="2"/>
    <line x1="8" y1="20" x2="32" y2="-10" stroke="#c8a45e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="20" x2="8" y2="-10" stroke="#c8a45e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Main text: OFÍCIO -->
  <text x="300" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="bold" fill="url(#logoGold)" text-anchor="middle" letter-spacing="12" filter="url(#logoShadow)">OFÍCIO</text>

  <!-- Divider line with ornaments -->
  <line x1="140" y1="110" x2="260" y2="110" stroke="url(#logoGold)" stroke-width="0.8" opacity="0.5"/>
  <circle cx="275" cy="110" r="1.5" fill="#c8a45e" opacity="0.6"/>
  <line x1="282" y1="110" x2="296" y2="110" stroke="#c8a45e" stroke-width="1" opacity="0.7"/>
  <circle cx="300" cy="110" r="3" fill="none" stroke="#c8a45e" stroke-width="1" opacity="0.6"/>
  <circle cx="300" cy="110" r="1" fill="#c8a45e" opacity="0.6"/>
  <line x1="304" y1="110" x2="318" y2="110" stroke="#c8a45e" stroke-width="1" opacity="0.7"/>
  <circle cx="325" cy="110" r="1.5" fill="#c8a45e" opacity="0.6"/>
  <line x1="340" y1="110" x2="460" y2="110" stroke="url(#logoGold)" stroke-width="0.8" opacity="0.5"/>

  <!-- Subtitle: BARBEARIA -->
  <text x="300" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#e8dcc8" text-anchor="middle" letter-spacing="16" opacity="0.85">BARBEARIA</text>

  <!-- Bottom decorative line with diamond -->
  <line x1="120" y1="155" x2="270" y2="155" stroke="url(#logoGold)" stroke-width="0.8" opacity="0.4"/>
  <polygon points="300,150 305,155 300,160 295,155" fill="#c8a45e" opacity="0.5"/>
  <line x1="330" y1="155" x2="480" y2="155" stroke="url(#logoGold)" stroke-width="0.8" opacity="0.4"/>

  <!-- Location text -->
  <text x="300" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#888888" text-anchor="middle" letter-spacing="8" opacity="0.7">KOBRASOL • SÃO JOSÉ</text>

  <!-- Additional filigree details -->
  <path d="M155,45 Q165,35 175,45" fill="none" stroke="#c8a45e" stroke-width="0.5" opacity="0.3"/>
  <path d="M425,45 Q435,35 445,45" fill="none" stroke="#c8a45e" stroke-width="0.5" opacity="0.3"/>
  <path d="M155,155 Q165,165 175,155" fill="none" stroke="#c8a45e" stroke-width="0.5" opacity="0.3"/>
  <path d="M425,155 Q435,165 445,155" fill="none" stroke="#c8a45e" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtle inner pattern dots -->
  <circle cx="100" cy="100" r="0.8" fill="#c8a45e" opacity="0.15"/>
  <circle cx="120" cy="100" r="0.8" fill="#c8a45e" opacity="0.15"/>
  <circle cx="140" cy="100" r="0.8" fill="#c8a45e" opacity="0.15"/>
  <circle cx="460" cy="100" r="0.8" fill="#c8a45e" opacity="0.15"/>
  <circle cx="480" cy="100" r="0.8" fill="#c8a45e" opacity="0.15"/>
  <circle cx="500" cy="100" r="0.8" fill="#c8a45e" opacity="0.15"/>
</svg>